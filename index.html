<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>AI FOOT RIVA DE ZAMOU</title>
    <style>
        :root { --bg: #0a0a0a; --card: #1a1e23; --text: #ffffff; --accent: #00ff9d; }
        body { font-family: sans-serif; background-color: var(--bg); color: var(--text); padding: 20px; }
        .section { background: var(--card); padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #333; }
        h2 { font-size: 1rem; color: var(--accent); margin-top: 0; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { background: #252a31; border: none; padding: 15px; color: white; border-radius: 10px; cursor: pointer; border: 2px solid transparent; }
        .btn-buy { border-color: #00ff9d; }
    </style>
</head>
<body>
    <h1 style="color: #00ff9d; text-align: center;">AI FOOT RIVA DE ZAMOU</h1>
    <div class="section">
        <h2>Étape 1 – Choisis le match</h2>
        <div class="grid">
            <button>PSG vs LYON</button>
            <button>CITY vs ARSENAL</button>
        </div>
    </div>
    <div class="section">
        <h2>Étape 2 – Que prédit l'IA ?</h2>
        <div class="grid">
            <button class="btn-buy">VICTOIRE DOMICILE</button>
            <button>VICTOIRE EXTÉRIEUR</button>
        </div>
    </div>
</body>
</html>
